
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegacyBuilt Command OS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<header>
<h1>LegacyBuilt Command OS</h1>
<p>LWA + Canine Haven Lead & Content Tracker</p>
</header>

<div class="tabs">
<button id="tabLWA">LWA Leads</button>
<button id="tabCHB">Canine Haven</button>
<button id="tabCalendar">Calendar</button>
</div>

<section id="lwaSection">

<h2>Add LWA Lead</h2>

<input id="lwaName" placeholder="Name">
<input id="lwaPlatform" placeholder="Platform">

<select id="lwaFollow">
<option value="24">24 Hours</option>
<option value="48">48 Hours</option>
<option value="72">72 Hours</option>
<option value="30">30 Days</option>
</select>

<input id="lwaDate" type="date">

<label><input type="checkbox" id="lwaVIP"> Joined FB VIP</label>
<label><input type="checkbox" id="lwaAffiliate"> Affiliate</label>
<label><input type="checkbox" id="lwaAmbassador"> Ambassador</label>
<label><input type="checkbox" id="lwaGhosted"> Ghosted</label>

<textarea id="lwaNotes" placeholder="Notes"></textarea>

<button id="addLWA">Save Lead</button>

<h3>LWA Leads</h3>
<div id="lwaList"></div>

</section>

<section id="chbSection" style="display:none">

<h2>Add Canine Haven Contact</h2>

<input id="chbName" placeholder="Name">
<input id="chbPlatform" placeholder="Platform">

<select id="chbFollow">
<option value="24">24 Hours</option>
<option value="48">48 Hours</option>
<option value="72">72 Hours</option>
<option value="30">30 Days</option>
</select>

<input id="chbDate" type="date">

<label><input type="checkbox" id="chbVIP"> Joined FB VIP</label>
<label><input type="checkbox" id="chbAffiliate"> Affiliate</label>
<label><input type="checkbox" id="chbAmbassador"> Ambassador</label>
<label><input type="checkbox" id="chbGhosted"> Ghosted</label>

<textarea id="chbNotes" placeholder="Notes"></textarea>

<button id="addCHB">Save Contact</button>

<h3>Contacts</h3>
<div id="chbList"></div>

</section>

<section id="calendarSection" style="display:none">

<h2>Follow Up Calendar</h2>
<div id="calendar"></div>

</section>

<script src="js/app.js"></script>

</body>
</html>
