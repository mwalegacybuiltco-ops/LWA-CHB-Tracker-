
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegacyBuilt Command OS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<header>
<h1>LegacyBuilt Command OS</h1>
<p>LWA + Canine Haven Business Dashboard</p>
</header>

<section>

<h2>Content Tracker</h2>

<input id="contentTitle" placeholder="Content idea / title">

<select id="contentBusiness">
<option value="LWA">LWA</option>
<option value="CHB">Canine Haven</option>
</select>

<select id="contentPlatform">
<option value="Facebook">Facebook</option>
<option value="TikTok">TikTok</option>
<option value="Instagram">Instagram</option>
</select>

<select id="contentStatus">
<option value="Idea">Idea</option>
<option value="Drafted">Drafted</option>
<option value="Posted">Posted</option>
</select>

<input type="date" id="contentDate">

<button onclick="addContent()">Add Content</button>

<h3>Tracked Content</h3>
<div id="contentList"></div>

</section>

<script src="js/app.js"></script>
</body>
</html>
